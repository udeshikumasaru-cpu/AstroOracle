name: Astro Oracle Weekly Run

on:
  schedule:
    - cron: "0 8 * * 0"   # Every Sunday 08:00 UTC
  workflow_dispatch:       # Manual trigger

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4          # ← MUST be first

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"                     # ← now works (requirements.txt exists)

      - name: Install system fonts
        run: sudo apt-get install -y fonts-liberation fonts-dejavu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Astro Oracle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_TOKEN_B64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
        run: python astro_main.py