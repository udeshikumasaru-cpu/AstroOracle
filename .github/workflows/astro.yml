name: Astro Oracle Weekly Run

on:
  schedule:
    - cron: "0 8 * * 0"   # Every Sunday 08:00 UTC
  workflow_dispatch:       # Manual trigger
    inputs:
      mode:
        description: "Run mode: all | omnibus | signs | transit | shorts | debug"
        required: false
        default: "all"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 340    # 5h 40m — safe ceiling for 25+ videos

    permissions:
      contents: read        # needed for checkout

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            fonts-liberation fonts-dejavu \
            ffmpeg \
            imagemagick

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Patch Gemini model (ensures fallback works)
        run: python fix_gemini_model.py

      - name: Verify YouTube token exists
        env:
          YOUTUBE_TOKEN_B64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
        run: |
          if [ -z "$YOUTUBE_TOKEN_B64" ]; then
            echo "❌ YOUTUBE_TOKEN_B64 secret is missing!"
            echo "Run generate_token.py locally, choose 'export as base64',"
            echo "then add the value to GitHub → Settings → Secrets."
            exit 1
          fi
          echo "✅ YouTube token secret found."

      - name: Decode & refresh YouTube token before run
        env:
          YOUTUBE_TOKEN_B64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
        run: |
          # Use Python to decode — immune to shell/whitespace/line-ending issues
          python3 - <<'EOF'
import os, base64, json, sys
from google.oauth2.credentials import Credentials
from google.auth.transport.requests import Request

# Decode token — strip ALL whitespace before decoding
raw = os.environ["YOUTUBE_TOKEN_B64"]
cleaned = "".join(raw.split())  # removes spaces, newlines, carriage returns
try:
    decoded = base64.b64decode(cleaned).decode("utf-8")
except Exception as e:
    print(f"❌ base64 decode failed: {e}", file=sys.stderr)
    sys.exit(1)

with open("token.json", "w") as f:
    f.write(decoded)
print("✅ token.json written.")

# Verify it is valid JSON
try:
    data = json.loads(decoded)
except Exception as e:
    print(f"❌ token.json is not valid JSON: {e}", file=sys.stderr)
    sys.exit(1)

# Refresh the token
creds = Credentials(
    token=data.get("token"),
    refresh_token=data.get("refresh_token"),
    token_uri=data.get("token_uri", "https://oauth2.googleapis.com/token"),
    client_id=data.get("client_id"),
    client_secret=data.get("client_secret"),
    scopes=data.get("scopes"),
)

if creds.refresh_token:
    creds.refresh(Request())
    updated = json.loads(creds.to_json())
    with open("token.json", "w") as f:
        json.dump(updated, f)
    print("✅ Token refreshed and written back to token.json")
else:
    print("⚠️  No refresh_token found — skipping refresh.")
EOF

      - name: Run Astro Oracle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_TOKEN_B64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          MODE="${MODE:-all}"
          echo "▶ Running: python astro_main.py $MODE"
          python astro_main.py $MODE 2>&1 | tee run_log.txt

      - name: Save refreshed token back to GitHub Secrets
        if: always()   # runs even if astro_main.py had partial failures
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ ! -f token.json ]; then
            echo "⚠️  token.json not found — skipping secret update."
            exit 0
          fi
          if [ -z "$GH_TOKEN" ]; then
            echo "⚠️  GH_PAT secret not set — skipping secret update."
            echo "    Add a PAT with secrets scope as GH_PAT in repo secrets."
            exit 0
          fi
          NEW_B64=$(base64 -w 0 token.json)
          gh secret set YOUTUBE_TOKEN_B64 \
            --repo "${{ github.repository }}" \
            --body "$NEW_B64"
          echo "✅ YOUTUBE_TOKEN_B64 secret updated with refreshed token."

      - name: Upload run log (always — even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: astro-run-log-${{ github.run_number }}
          path: |
            run_log.txt
            uploaded_astro.json
            script_*.txt
          retention-days: 14

      - name: Check for failures in log
        if: always()
        run: |
          if grep -q "Failed:[^0]" run_log.txt; then
            echo "⚠️ Some videos failed — check the uploaded log artifact."
            # Not a hard exit — partial success is still success
          fi
          if grep -q "deleted_client" run_log.txt; then
            echo "❌ OAuth client deleted! Re-run generate_token.py locally"
            echo "   and update the YOUTUBE_TOKEN_B64 GitHub secret."
            exit 1
          fi
          if grep -q "invalid_grant" run_log.txt; then
            echo "❌ Token invalid_grant error detected!"
            echo "   Re-run generate_token.py locally and update YOUTUBE_TOKEN_B64."
            exit 1
          fi
